<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="support.title">Support — FrameFinish</title>
  <meta name="description" data-i18n="meta.description" content="" />
  <meta name="theme-color" content="#fbfbf6" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://api.web3forms.com" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="FrameFinish">
        <img class="brand-mark" src="assets/logo.svg" alt="" width="30" height="30" />
        <span>Frame<span class="brand-fin">Finish</span></span>
      </a>
      <nav class="nav" data-nav-menu>
        <a class="nav-link" href="features.html" data-i18n="nav.features">Funktionen</a>
        <a class="nav-link" href="index.html#how" data-i18n="nav.how">So funktioniert’s</a>
        <a class="nav-link" href="index.html#audience" data-i18n="nav.audience">Für wen</a>
        <a class="nav-link" href="privacy.html" data-i18n="nav.privacy">Datenschutz</a>
        <a class="nav-link" href="support.html" data-i18n="nav.support">Support</a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-label="Theme">
          <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>
        </button>
        <button class="lang-toggle" data-lang-toggle type="button" onclick="toggleLang()">EN</button>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" data-theme-toggle type="button" aria-label="Theme">
          <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>
        </button>
        <button class="lang-toggle" data-lang-toggle type="button" onclick="toggleLang()">EN</button>
        <a class="btn btn-primary" href="support.html" data-i18n="nav.cta">Beta testen</a>
        <button class="nav-toggle" data-nav-toggle aria-label="Menü" aria-expanded="false"><span></span></button>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1 data-i18n="support.title">Support &amp; Kontakt</h1>
        <p class="lead" style="margin:0;max-width:640px" data-i18n="support.subtitle"></p>
      </div>
    </section>

    <section class="section-sm" style="padding-top:8px">
      <div class="container">
        <div class="form-wrap">
          <!-- Kill-Switch-Hinweis (wird per JS eingeblendet, wenn formEnabled=false) -->
          <div id="form-disabled" class="form-disabled" data-i18n="support.disabled"></div>

          <!-- Status-Meldung -->
          <div id="form-status" class="form-status" role="status" aria-live="polite"></div>

          <form id="support-form" novalidate>
            <div class="form-row">
              <label for="f-name" data-i18n="support.name">Name</label>
              <input id="f-name" name="name" type="text" autocomplete="name"
                     data-i18n-attr="placeholder:support.namePlaceholder" required />
            </div>
            <div class="form-row">
              <label for="f-email" data-i18n="support.email">Deine E-Mail (für die Antwort)</label>
              <input id="f-email" name="email" type="email" autocomplete="email"
                     data-i18n-attr="placeholder:support.emailPlaceholder" required />
            </div>
            <div class="form-row">
              <label for="f-subject" data-i18n="support.subject">Betreff</label>
              <input id="f-subject" name="subject" type="text"
                     data-i18n-attr="placeholder:support.subjectPlaceholder" required />
            </div>
            <div class="form-row">
              <label for="f-message" data-i18n="support.message">Nachricht</label>
              <textarea id="f-message" name="message"
                        data-i18n-attr="placeholder:support.messagePlaceholder" required></textarea>
            </div>

            <!-- Honeypot: für Menschen unsichtbar, Bots füllen es aus -->
            <div class="honeypot" aria-hidden="true">
              <label>Leave this empty <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" /></label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block" data-i18n="support.send">Nachricht senden</button>
            <p class="form-hint" data-i18n="support.privacyHint"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding-top:0">
        <span>© <span data-year>2026</span> FrameFinish · <span data-i18n="footer.rights">Alle Rechte vorbehalten.</span></span>
        <span>
          <a href="privacy.html" data-i18n="footer.privacy">Datenschutz</a> ·
          <a href="impressum.html" data-i18n="footer.impressum">Impressum</a> ·
          <a href="support.html" data-i18n="footer.support">Support</a>
        </span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
