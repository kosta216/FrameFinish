      <g transform="rotate(180)"><path d="M 12,0 A 12,12 0 0,1 6,10.4 L -1,1.8 Z"/></g>
      <g transform="rotate(240)"><path d="M 12,0 A 12,12 0 0,1 6,10.4 L -1,1.8 Z"/></g>
      <g transform="rotate(300)"><path d="M 12,0 A 12,12 0 0,1 6,10.4 L -1,1.8 Z"/></g>
    </g>
    <circle cx="32" cy="36" r="1.4" fill="#fff" stroke="none"/>
