<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="FrameFinish">
  <defs>
    <radialGradient id="ffBg" cx="30%" cy="15%" r="100%">
      <stop offset="0%"  stop-color="#5ee895"/>
      <stop offset="45%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#0e8a45"/>
    </radialGradient>
    <linearGradient id="ffSheen" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="229" fill="url(#ffBg)"/>
  <rect width="1024" height="1024" rx="229" fill="url(#ffSheen)"/>

  <g stroke="#FFFFFF" stroke-width="30" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown / top knob of stopwatch -->
    <rect x="466" y="120" width="92" height="48" rx="20" fill="#FFFFFF" stroke="none"/>
    <line x1="512" y1="168" x2="512" y2="208"/>
    <!-- Side button at ~1 o'clock -->
    <g transform="rotate(32 512 560)">
      <rect x="492" y="180" width="40" height="56" rx="14" fill="#FFFFFF" stroke="none"/>
    </g>
    <!-- Watch outer + inner rings -->
    <circle cx="512" cy="560" r="320"/>
    <circle cx="512" cy="560" r="286"/>
    <!-- Tick marks at 12, 3, 6, 9 -->
    <line x1="512" y1="260" x2="512" y2="306"/>
    <line x1="812" y1="560" x2="766" y2="560"/>
    <line x1="512" y1="860" x2="512" y2="814"/>
    <line x1="212" y1="560" x2="258" y2="560"/>
    <!-- Camera iris: 6 swirling blade outlines around (512, 560) -->
    <g transform="translate(512 560)" stroke-width="22">
      <g transform="rotate(0)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
      <g transform="rotate(60)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
      <g transform="rotate(120)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
      <g transform="rotate(180)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
      <g transform="rotate(240)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
      <g transform="rotate(300)"><path d="M 220,0 A 220,220 0 0,1 110,190.5 L -18,32 Z"/></g>
    </g>
    <!-- Iris center pivot -->
    <circle cx="512" cy="560" r="20" fill="#FFFFFF" stroke="none"/>
  </g>
</svg>
